services:
  mongo:
    image: mongo:7
    container_name: smart-task-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: smart-task-backend
    ports:
      - "5003:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/smart_task_assignment
      JWT_SECRET: docker_development_secret_change_me
      JWT_EXPIRES_IN: 1d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: smart-task-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5003/api
    depends_on:
      - backend

volumes:
  mongo_data:
